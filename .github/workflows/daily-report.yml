name: Informe Seguridad - Scraping Diario

on:
  schedule:
    # Todos los dÃ­as a las 12:00 UTC (9:00 AM Chile CLT / 8:00 AM CLST)
    - cron: '0 12 * * *'
  workflow_dispatch: # Permite ejecuciÃ³n manual

permissions:
  contents: write

jobs:
  scrape-and-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        env:
          ICONSTRUYE_USER: ${{ secrets.ICONSTRUYE_USER }}
          ICONSTRUYE_PASS: ${{ secrets.ICONSTRUYE_PASS }}
        run: npm run scrape

      - name: Generate report
        run: npm run report

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: informe-seguridad-${{ github.run_number }}
          path: output/informe_seguridad_recepciones.html
          retention-days: 90

      - name: Upload raw data artifact
        uses: actions/upload-artifact@v4
        with:
          name: raw-data-${{ github.run_number }}
          path: data/raw_data.json
          retention-days: 90

      - name: Commit updated report to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ data/
          git diff --staged --quiet || git commit -m "Actualizar informe de seguridad $(date +'%Y-%m-%d')"
          git push

      - name: Upload error screenshot (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshot-${{ github.run_number }}
          path: data/error_screenshot.png
          if-no-files-found: ignore
